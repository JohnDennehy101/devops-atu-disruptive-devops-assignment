name: Custom Playwright Action Test
on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      llm_provider:
        description: "LLM provider"
        type: choice
        options:
          - huggingface
          - claude
          - self-hosted
        default: "huggingface"
      model_id:
        description: "Model ID (leave empty for default)"
        required: false

jobs:
  ai-playwright:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Resolve LLM configuration
        id: llm
        run: |
          PROVIDER="${{ github.event.inputs.llm_provider || 'huggingface' }}"

          case "$PROVIDER" in
            claude)
              echo "host=claude" >> $GITHUB_OUTPUT
              echo "api_key=${{ secrets.ANTHROPIC_API_KEY }}" >> $GITHUB_OUTPUT
              echo "model=${{ github.event.inputs.model_id || 'claude-sonnet-4-20250514' }}" >> $GITHUB_OUTPUT
              echo 'mcp_servers={"playwright": {"command": "npx", "args": ["@playwright/mcp@latest"]}}' >> $GITHUB_OUTPUT
              ;;
            self-hosted)
              echo "host=${{ secrets.LLM_HOST }}" >> $GITHUB_OUTPUT
              echo "api_key=${{ secrets.LLM_API_KEY }}" >> $GITHUB_OUTPUT
              echo "model=${{ github.event.inputs.model_id || secrets.MODEL_NAME }}" >> $GITHUB_OUTPUT
              echo "mcp_servers=" >> $GITHUB_OUTPUT
              ;;
            *)
              echo "host=huggingface" >> $GITHUB_OUTPUT
              echo "api_key=${{ secrets.HF_API_KEY }}" >> $GITHUB_OUTPUT
              echo "model=${{ github.event.inputs.model_id || 'Qwen/Qwen2.5-Coder-32B-Instruct' }}" >> $GITHUB_OUTPUT
              echo "mcp_servers=" >> $GITHUB_OUTPUT
              ;;
          esac

      - name: AI Playwright
        uses: johndennehy101/ai-playwright-action@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          llm-host: ${{ steps.llm.outputs.host }}
          llm-api-key: ${{ steps.llm.outputs.api_key }}
          model-id: ${{ steps.llm.outputs.model }}
          exclude-pattern: ^(versions|model_outputs|eval_outputs|scripts)/.*
          include-existing-tests: "true"
          include-source-files: "true"
          test-file-suffixes: ".spec"
          test-file-roots: "app/e2e"
          run-tests: "true"
          app-directory: "app"
          dev-server-url: "http://localhost:5175"
          test-output-path: "e2e/ai-generated.spec.ts"
          start-dev-server: "false"
          mcp-servers: ${{ steps.llm.outputs.mcp_servers }}
